apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  # ВАЖНО: Это TEMPLATE для примера. НЕ коммитить реальные пароли!
  #
  # Перед первым применением создать настоящий secret руками:
  # kubectl create secret generic postgres-secret -n shenkobot \
  #   --from-literal=POSTGRES_USER=postgres \
  #   --from-literal=POSTGRES_PASSWORD=<REAL_PASSWORD_HERE> \
  #   --from-literal=POSTGRES_DB=shenkobot
  #
  # После создания удалить этот файл из применения или закомментировать в kustomization.yaml
  POSTGRES_USER: <REPLACE_WITH_USERNAME>
  POSTGRES_PASSWORD: <REPLACE_WITH_STRONG_PASSWORD>
  POSTGRES_DB: shenkobot
