services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      # Force password auth on every TCP connection.
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db
    # No `ports:` — postgres is unreachable from the host or the public internet.
    # The `db` network has `internal: true`, so even outbound from postgres is blocked.
    # For one-off admin via SSH tunnel, uncomment exactly this (loopback only):
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build:
      context: .
    image: shenkobot:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      CHAT_ID: ${CHAT_ID}
      REMINDER_HOURS: ${REMINDER_HOURS:-72}
      QUESTION: ${QUESTION:-Когда вернешься?}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    networks:
      - db       # talks to postgres only
      - egress   # outbound to Telegram API
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # DB-only network. `internal: true` strips the default route, so anything
  # attached here cannot reach the public internet — postgres is air-gapped.
  db:
    internal: true
  # Outbound network for the bot → Telegram API. Standard bridge w/ NAT.
  egress:

volumes:
  pgdata:
